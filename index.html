<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Expert Calculator</title>
    <style>
        :root { --primary: #1a73e8; --success: #2e7d32; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 20px; color: #333; }
        .calculator { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 480px; width: 100%; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-weight: 800; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full { grid-column: span 2; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; background: #fff; transition: all 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,115,232,0.1); outline: none; }
        
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .res-card { background: #f1f8e9; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #dcedc8; }
        .res-card.blue { background: #e3f2fd; border-color: #bbdefb; }
        .res-label { font-size: 12px; color: #555; display: block; margin-bottom: 5px; }
        .res-val { font-size: 18px; font-weight: 800; color: var(--success); }
        .blue .res-val { color: var(--primary); }
        
        .footer-info { margin-top: 15px; padding: 12px; background: #fffde7; border-radius: 10px; text-align: center; font-size: 14px; border: 1px solid #fff9c4; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>EV Калькулятор</h2>
    
    <div class="grid">
        <div class="form-group">
            <label>Витрата (кВт/100км)</label>
            <input type="number" id="cons" value="15.3" step="0.1" oninput="calc()">
        </div>
        <div class="form-group">
            <label>Деградація (%)</label>
            <input type="number" id="degr" value="5" min="0" oninput="calc()">
        </div>
        <div class="form-group full">
            <label>Умови (Пора року)</label>
            <select id="season" onchange="calc()">
                <option value="1">Літо (100% ефективність)</option>
                <option value="0.8" selected>Зима середня (80%)</option>
                <option value="0.6">Зима люта (60%)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Батарея (кВт⋅год)</label>
            <input type="number" id="cap" value="64" oninput="calc()">
        </div>
        <div class="form-group">
            <label>Зарядка (кВт)</label>
            <select id="pwr" onchange="calc()">
                <option value="2.1">2.1 кВт</option>
                <option value="3.2">3.2 кВт</option>
                <option value="10.9">10.9 кВт</option>
                <option value="22">22 кВт</option>
                <option value="50" selected>50 кВт</option>
                <option value="160">160 кВт</option>
            </select>
        </div>
        <div class="form-group">
            <label>Час сесії (год)</label>
            <input type="number" id="time" value="1" step="0.1" oninput="calc()">
        </div>
        <div class="form-group">
            <label>Ціна (грн/кВт)</label>
            <select id="price" onchange="calc()">
                <option value="3.8">3.8 грн</option>
                <option value="20">20 грн</option>
                <option value="21" selected>21 грн</option>
                <option value="22">22 грн</option>
            </select>
        </div>
    </div>

    <div class="results-grid">
        <div class="res-card blue">
            <span class="res-label">Додано енергії</span>
            <span class="res-val" id="out-e">0</span> <small>кВт⋅год</small>
        </div>
        <div class="res-card blue">
            <span class="res-label">Запас ходу</span>
            <span class="res-val" id="out-r">0</span> <small>км</small>
        </div>
        <div class="res-card">
            <span class="res-label">Вартість сесії</span>
            <span class="res-val" id="out-c">0</span> <small>грн</small>
        </div>
        <div class="res-card">
            <span class="res-label">100 км пробігу</span>
            <span class="res-val" id="out-100">0</span> <small>грн</small>
        </div>
    </div>

    <div class="footer-info">
        Час повної зарядки (0-100%): <strong id="out-full">0</strong>
    </div>
</div>

<script>
    function calc() {
        const cons = parseFloat(document.getElementById('cons').value) || 0;
        const season = parseFloat(document.getElementById('season').value) || 1;
        const degr = parseFloat(document.getElementById('degr').value) || 0;
        const cap = parseFloat(document.getElementById('cap').value) || 0;
        const pwr = parseFloat(document.getElementById('pwr').value) || 0;
        const time = parseFloat(document.getElementById('time').value) || 0;
        const price = parseFloat(document.getElementById('price').value) || 0;

        const actualCap = cap * (1 - (degr / 100));
        let energy = Math.min(pwr * time, actualCap);
        
        const range = (cons > 0) ? (energy / (cons / 100)) * season : 0;
        const sessionCost = energy * price;
        
        // Розрахунок вартості 100 км з урахуванням втрат взимку
        const cost100 = (cons / season) * price;

        // Повна зарядка
        const fHDec = actualCap / pwr;
        const h = Math.floor(fHDec);
        const m = Math.round((fHDec - h) * 60);

        document.getElementById('out-e').innerText = energy.toFixed(1);
        document.getElementById('out-r').innerText = `+${Math.round(range)}`;
        document.getElementById('out-c').innerText = sessionCost.toFixed(2);
        document.getElementById('out-100').innerText = cost100.toFixed(2);
        document.getElementById('out-full').innerText = `${h}г ${m}хв`;
    }
    window.onload = calc;
</script>

</body>
</html>
